name: Release .dmg

# Build ghbdtn.app into a .dmg on a macOS runner and attach it to the GitHub
# Release whenever a version tag (vX.Y.Z) is pushed. Manual runs
# (workflow_dispatch) build the .dmg for testing but skip the upload.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Least privilege by default. The job below re-grants only `contents: write`,
# and only after the `release` environment's required reviewer approves.
permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-14        # Apple Silicon runner (matches the arm64 app)
    # NOTE: there is deliberately NO `environment:` approval gate here. On a
    # private repo on the free plan, required reviewers on environments aren't
    # available, so an `environment:` line would imply protection that isn't
    # enforced. The real gate is that only the repo owner can push a `v*` tag.
    permissions:
      contents: write        # create/update releases and upload assets
    env:
      # Runner locale can be non-UTF-8, where bash 3.2 folds bytes of a
      # trailing "…" into a variable name ($VAR… → unbound). UTF-8 + braced
      # vars in the scripts both guard against it.
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      # Actions are pinned to a commit SHA (not a moving @v4/@v2 major tag) so a
      # retagged/compromised action can't silently enter the release pipeline.
      # The trailing comment records the version each SHA corresponds to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Toolchain info
        run: swift --version && sw_vers

      # whisper.xcframework is pinned+checksummed in fetch-whisper.sh, so cache
      # it by that file's hash to avoid re-downloading ~48 MB every run.
      - name: Cache whisper.xcframework
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: Vendor
          key: whisper-${{ hashFiles('tools/fetch-whisper.sh') }}

      # CI builds an AD-HOC-signed .dmg only. No signing key lives in Actions:
      # the "Ghbdtn Local Signing" P12 secret was intentionally removed so the
      # private key that preserves the Accessibility grant never sits next to
      # mutable third-party actions. To ship a stable-signed release, sign
      # LOCALLY (build.sh uses the identity in your own keychain) and upload,
      # or run make-dist.sh locally. See docs/SECURITY.md.
      - name: Build .dmg (ad-hoc signing)
        run: ./tools/make-dist.sh

      - name: Attach .dmg to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true

# NOTE: real Developer ID signing + notarization is not wired in — the .dmg is
# ad-hoc signed and the app self-signed, a deliberate limitation until a paid
# Apple Developer account is available (see docs/SECURITY.md). With no P12 secret
# set, no private key is present on the runner to leak.
